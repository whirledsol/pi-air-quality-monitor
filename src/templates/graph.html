<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="" />
    <title>Raspberry Pi Air Quality Monitor</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      .historicalChart {
        width: 100%;
        height: 200px;
      }
    </style>
  </head>

  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-12 my-3">
          <h1><a class="me-3" href="/">🏡</a> RPI Air Quality Monitor Graph</h1>
        </div>
      </div>
      <div class="row">
        <div class="col-lg-12 text-center text-lg-end">
          <div
            id="timeframeHours"
            class="btn-group d-inline-block me-3 m-1"
            role="group"
          >
            <button type="button" data-value="1" class="btn btn-secondary">
              1h
            </button>
            <button type="button" data-value="6" class="btn btn-secondary">
              6h
            </button>
            <button type="button" data-value="24" class="btn btn-secondary">
              1d
            </button>
            <button type="button" data-value="72" class="btn btn-secondary">
              3d
            </button>
            <button type="button" data-value="168" class="btn btn-secondary">
              7d
            </button>
          </div>
          <button id="btn-update" class="btn btn-primary m-1">Refresh</button>
          <button id="btn-measure" class="btn btn-warning m-1">Measure</button>
        </div>
        <!-- CHART -->
        <div class="col-12">
          <canvas id="historicalChart" width="100%" height="200"></canvas>
        </div>
      </div>
      <div class="row mt-3">
        <!-- STATISTICS -->
        <div class="col-lg-6">
          <div class="display-1 fs-2">Statistics</div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.3.2/chart.min.js"
      integrity="sha512-VCHVc5miKoln972iJPvkQrUYYq7XpxXzvqNfiul1H4aZDwGBGC0lq373KNleaB2LpnC2a/iNfE5zoRYmB4TRDQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <script>
      window.mobileCheck = function () {
        let check = false;
        (function (a) {
          if (
            /(android|bb\d+|meego).+mobile|avantgo|bada\/|blackberry|blazer|compal|elaine|fennec|hiptop|iemobile|ip(hone|od)|iris|kindle|lge |maemo|midp|mmp|mobile.+firefox|netfront|opera m(ob|in)i|palm( os)?|phone|p(ixi|re)\/|plucker|pocket|psp|series(4|6)0|symbian|treo|up\.(browser|link)|vodafone|wap|windows ce|xda|xiino/i.test(
              a,
            ) ||
            /1207|6310|6590|3gso|4thp|50[1-6]i|770s|802s|a wa|abac|ac(er|oo|s\-)|ai(ko|rn)|al(av|ca|co)|amoi|an(ex|ny|yw)|aptu|ar(ch|go)|as(te|us)|attw|au(di|\-m|r |s )|avan|be(ck|ll|nq)|bi(lb|rd)|bl(ac|az)|br(e|v)w|bumb|bw\-(n|u)|c55\/|capi|ccwa|cdm\-|cell|chtm|cldc|cmd\-|co(mp|nd)|craw|da(it|ll|ng)|dbte|dc\-s|devi|dica|dmob|do(c|p)o|ds(12|\-d)|el(49|ai)|em(l2|ul)|er(ic|k0)|esl8|ez([4-7]0|os|wa|ze)|fetc|fly(\-|_)|g1 u|g560|gene|gf\-5|g\-mo|go(\.w|od)|gr(ad|un)|haie|hcit|hd\-(m|p|t)|hei\-|hi(pt|ta)|hp( i|ip)|hs\-c|ht(c(\-| |_|a|g|p|s|t)|tp)|hu(aw|tc)|i\-(20|go|ma)|i230|iac( |\-|\/)|ibro|idea|ig01|ikom|im1k|inno|ipaq|iris|ja(t|v)a|jbro|jemu|jigs|kddi|keji|kgt( |\/)|klon|kpt |kwc\-|kyo(c|k)|le(no|xi)|lg( g|\/(k|l|u)|50|54|\-[a-w])|libw|lynx|m1\-w|m3ga|m50\/|ma(te|ui|xo)|mc(01|21|ca)|m\-cr|me(rc|ri)|mi(o8|oa|ts)|mmef|mo(01|02|bi|de|do|t(\-| |o|v)|zz)|mt(50|p1|v )|mwbp|mywa|n10[0-2]|n20[2-3]|n30(0|2)|n50(0|2|5)|n7(0(0|1)|10)|ne((c|m)\-|on|tf|wf|wg|wt)|nok(6|i)|nzph|o2im|op(ti|wv)|oran|owg1|p800|pan(a|d|t)|pdxg|pg(13|\-([1-8]|c))|phil|pire|pl(ay|uc)|pn\-2|po(ck|rt|se)|prox|psio|pt\-g|qa\-a|qc(07|12|21|32|60|\-[2-7]|i\-)|qtek|r380|r600|raks|rim9|ro(ve|zo)|s55\/|sa(ge|ma|mm|ms|ny|va)|sc(01|h\-|oo|p\-)|sdk\/|se(c(\-|0|1)|47|mc|nd|ri)|sgh\-|shar|sie(\-|m)|sk\-0|sl(45|id)|sm(al|ar|b3|it|t5)|so(ft|ny)|sp(01|h\-|v\-|v )|sy(01|mb)|t2(18|50)|t6(00|10|18)|ta(gt|lk)|tcl\-|tdg\-|tel(i|m)|tim\-|t\-mo|to(pl|sh)|ts(70|m\-|m3|m5)|tx\-9|up(\.b|g1|si)|utst|v400|v750|veri|vi(rg|te)|vk(40|5[0-3]|\-v)|vm40|voda|vulc|vx(52|53|60|61|70|80|81|83|85|98)|w3c(\-| )|webc|whit|wi(g |nc|nw)|wmlb|wonu|x700|yas\-|your|zeto|zte\-/i.test(
              a.substr(0, 4),
            )
          )
            check = true;
        })(navigator.userAgent || navigator.vendor || window.opera);
        return check;
      };
    </script>
    <script>
      var chart = null;
      $(function () {
        //cool little trick to quickly store state in hash
        var setHashQueryParams = (obj) => {
          obj ??= {};
          const queryString = Object.entries(obj)
            .map(
              ([key, value]) =>
                `${encodeURIComponent(key)}=${encodeURIComponent(value)}`,
            )
            .join("&");
          location.hash = "?" + queryString;
        };

        //and retrieval
        var getHashQueryParams = () => {
          let queryString = location.hash ?? "";
          queryString = queryString.replace("#?", "");
          const parameters = queryString.split("&");
          return parameters.reduce((acc, cur) => {
            const tokens = cur.split("=");
            const key = tokens[0];
            const value = tokens[1];
            acc[key] = value;
            return acc;
          }, {});
        };

        //updateTimeframeButtonHighlight
        var updateTimeframeButtonHighlight = () => {
          const { timeframeHours = 24 } = getHashQueryParams();

          $("#timeframeHours > button").each((i, el) => {
            const $button = $(el);
            const value = $button.data("value");
            $button.removeClass(["btn-secondary", "btn-warning"]);
            const className =
              value == timeframeHours ? "btn-warning" : "btn-secondary";
            $button.addClass(className);
          });
        };

        //update and rebuild chart
        var updateChart = async () => {
          const queryParams = getHashQueryParams();
          console.log("queryParams", queryParams);
          const { timeframeHours = 24 } = queryParams;
          console.log("updateChart", timeframeHours);
          const data = await $.getJSON(`/api?timeframeHours=${timeframeHours}`);
          //console.log("res", data);

          const canvas = document.getElementById("historicalChart");
          const ctx = canvas.getContext("2d");

          if (chart) {
            chart.destroy();
          }

          //get data length
          const dataLength = data?.historical?.labels?.length ?? 0;

          //dynamic tick spacing to show up to 10 labels
          const xTickSpacing = parseInt(Math.ceil(dataLength / 10));

          //console.log("xTickSpacing", dataLength, xTickSpacing);

          //convert labels to local
          const labels = data.historical.labels.map((x) =>
            new Date(x + "Z").toLocaleString(),
          );

          chart = new Chart(ctx, {
            type: "line",
            data: {
              labels: labels,
              datasets: [
                data.historical.aqi,
                data.historical.pm10,
                data.historical.pm2,
              ],
            },
            options: {
              aspectRatio: window.mobileCheck() ? 0.5 : 4,
              scales: {
                y: {
                  beginAtZero: true,
                },
                x: {
                  ticks: {
                    callback: function (val, index) {
                      const label = this.getLabelForValue(val);
                      return index % xTickSpacing === 0 ? label : "";
                    },
                  },
                },
              },
            },
          });
        };

        //timeframe button click event
        $("#timeframeHours > button").on("click", (e) => {
          const value = $(e.target).data("value");
          setHashQueryParams({ timeframeHours: value });
          updateChart();
          updateTimeframeButtonHighlight();
        });

        //update btn click event
        $("#btn-update").on("click", updateChart);

        //measure btn click event
        $("#btn-measure").on("click", async (_) => {
          const response = await fetch("/api/now?save=1");
          if (!response.ok) {
            throw new Error(`Response status: ${response.status}`);
          }

          const result = await response.json();
          console.log("measuring response...", result);
        });

        //on load
        $("#btn-update").click();
        updateTimeframeButtonHighlight();
      });
    </script>
  </body>
</html>
